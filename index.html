<html lang="en">

        .app{
            width: 100vw;
            height: 100vh;
            /* 子元素设置margin,父元素会溢出,设置overflow解决. */
            overflow: hidden;

            /* background-color: mediumpurple; */
            /* background-attachment: fixed; */
            /* background-position: center center; */
            background: url('./bg_img.png') no-repeat;
            background-size: cover;
        }


        .content-box{
            width: 56rem;
            height: 52rem;
            margin: 21rem auto;

            background-color: rgba(0, 0, 0, 0.3);
        }
        .content-box>h3{
            text-align: center;
            font-size: 48px;
            color: mediumpurple;
        }
        .content-box>span>a{
            color: gray;
            font-size: 32px;
        }
        .content-box>span>a:hover{

        }
    </style>
</head>
